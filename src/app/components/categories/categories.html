<section class="page-header">
  <h2>Categories</h2>
  <p>Create and manage income and expense categories.</p>
</section>

<section class="panel form-panel">
  <h3>Add Category</h3>

  <form [formGroup]="categoryForm" (ngSubmit)="submit()" class="form-grid">
    <label>
      Category Name
      <input type="text" formControlName="name" />
    </label>

    <label>
      Type
      <select formControlName="type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
    </label>

    <div class="actions">
      <button type="submit">Submit</button>
    </div>
  </form>
</section>

<section class="panel">
  <h3>Category List</h3>

  @if (categories().length === 0) {
    <p class="empty">No categories added yet.</p>
  } @else {
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          @for (item of categories(); track item.id) {
            <tr>
              <td>{{ item.name }}</td>
              <td>
                <span class="type" [class.income]="item.type === 'income'" [class.expense]="item.type === 'expense'">
                  {{ item.type }}
                </span>
              </td>
              <td>
                <button type="button" class="delete" (click)="deleteCategory(item)">Delete</button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</section>
